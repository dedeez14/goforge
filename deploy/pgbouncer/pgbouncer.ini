; PgBouncer configuration for goforge in front of PostgreSQL 16.
;
; Purpose: amortise backend connections across many goforge pods. At
; 20 pods × 20 pgx pool conns each that is 400 connections into
; Postgres - every one of which costs ~10 MiB of RAM. PgBouncer lets
; goforge keep its client-side pool for per-request latency while
; capping the real backend count to something Postgres can handle.
;
; Transaction-pooling mode is required because goforge ships with
; GOFORGE_DATABASE_STATEMENT_CACHE=false in production, which makes
; pgx use the simple query protocol (no prepared statements, no
; session-scoped state). Do NOT flip to session-pooling unless you
; have a specific reason; it defeats the connection amortisation.

[databases]
; Each goforge database gets its own entry so pool sizes can be
; tuned independently. Point at the real Postgres host:port.
goforge = host=postgres port=5432 dbname=goforge auth_user=goforge

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432

; Authentication: HBA-style; passwords hashed in userlist.txt. The
; goforge client authenticates with SCRAM-SHA-256 using the same
; password as it would against Postgres directly.
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt
; Lets PgBouncer resolve unknown users by querying the backend
; using the auth_user credentials. Drop this if your threat model
; wants the userlist to be the sole source of truth.
auth_query = SELECT usename, passwd FROM pg_shadow WHERE usename=$1

; ---------------- Pool sizing ----------------
;
; Rules of thumb:
;   - default_pool_size = CPU_cores × 2..4 per Postgres box. This
;     is the limiter that matters; Postgres cannot usefully run
;     more concurrent active queries than cores × a small factor.
;   - max_client_conn = expected peak app-side connections across
;     every pod; PgBouncer multiplexes them down to default_pool_size.
;   - reserve_pool_size kicks in under sustained load; tune only if
;     you see client_waiting metric climb.
pool_mode = transaction
max_client_conn = 1000
default_pool_size = 25
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 3

; ---------------- Timeouts ----------------
;
; server_idle_timeout: a spare backend is recycled after this long
; idle. Keep it comfortably above the pgx MaxConnIdleTime so pgx
; never finds a dead socket in its pool.
server_idle_timeout = 600
server_lifetime = 3600
query_wait_timeout = 120

; ---------------- Observability ----------------
;
; stats_users can `SHOW` the runtime counters needed for Grafana
; dashboards (cl_active, sv_active, maxwait, ...). Give the role
; only the stats_users privilege - it can see every database.
stats_users = pgbouncer_stats
admin_users = pgbouncer_admin

; Compact logging - every connection and disconnection is noisy.
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1

; ---------------- Hardening ----------------
;
; Transaction mode disallows SET, prepared statements, and
; LISTEN/NOTIFY from the client; PgBouncer blocks them. goforge
; uses none of those when StatementCache=false.
server_check_query = SELECT 1
server_check_delay = 30
ignore_startup_parameters = extra_float_digits,search_path
