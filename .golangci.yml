run:
  timeout: 5m
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - gocritic
    - revive
    - misspell
    - bodyclose
    - noctx
    - nilerr
    - errorlint
    - unconvert
    - unparam

linters-settings:
  goimports:
    local-prefixes: github.com/dedeez14/goforge
  revive:
    rules:
      - name: package-comments
        disabled: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-use-default: false
